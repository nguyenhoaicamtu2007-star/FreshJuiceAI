<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>FreshJuice AI</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #ff5e62;
    }

    p {
      font-weight: bold;
      margin-top: 12px;
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      background: #ff5e62;
      color: white;
      font-weight: bold;
      margin-top: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #e14b50;
    }

    .item {
      background: #fff3f3;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .price {
      float: right;
      color: #ff5e62;
      font-weight: bold;
    }

    .title-result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>FreshJuice AI</h2>

  <p>Khẩu vị</p>
  <select id="taste">
    <option>Ngọt</option>
    <option>Chua</option>
    <option>Thanh mát</option>
  </select>

  <p>Mục tiêu sức khỏe</p>
  <select id="goal">
    <option value="depda">Đẹp da</option>
    <option value="giamcan">Giảm cân</option>
    <option value="khang">Tăng đề kháng</option>
    <option value="giaikhat">Giải khát</option>
  </select>

  <p>Thời điểm sử dụng</p>
  <select id="time">
    <option value="ngay">Ban ngày</option>
    <option value="toi">Buổi tối</option>
  </select>

  <p>Mức giá mong muốn</p>
  <select id="price">
    <option value="all">Tất cả</option>
    <option value="20">20K</option>
    <option value="25">25K</option>
    <option value="30">30K</option>
    <option value="35">35K</option>
  </select>

  <p>Dị ứng (ví dụ: cam, dứa)</p>
  <input type="text" id="allergy">

  <button onclick="goiY()">Gợi ý</button>

  <div class="title-result">Kết quả</div>
  <div id="result"></div>
</div>

<script>
function goiY() {
  let goal = document.getElementById("goal").value;
  let time = document.getElementById("time").value;
  let priceFilter = document.getElementById("price").value;

  let allergyInput = document.getElementById("allergy").value.toLowerCase();
  let allergies = allergyInput.split(",").map(a => a.trim());

  let menu = [];

  function isAllowed(name) {
    for (let a of allergies) {
      if (a && name.toLowerCase().includes(a)) {
        return false;
      }
    }
    return true;
  }

  function add(name, price) {
    if (isAllowed(name)) {
      if (priceFilter === "all" || price === priceFilter + "K") {
menu.push({ name, price });
      }
    }
  }

  // Gợi ý
  if (goal === "khang") {
    add("Cam + Gừng", "20K");
    add("Cam + Cà rốt + Mật ong", "30K");
    add("Dứa + Táo + Cam", "35K");
  }

  else if (goal === "giamcan") {
    if (time === "ngay") {
      add("Cần tây + Chanh", "20K");
      add("Táo + Cần tây + Dưa leo", "30K");
    } else {
      add("Cần tây + Táo", "20K");
      add("Dưa leo + Táo + Bạc hà", "30K");
    }
  }

  else if (goal === "depda") {
    add("Dâu + Cam", "20K");
    add("Cà rốt + Cam + Táo", "30K");
    add("Dưa hấu + Táo + Dứa", "30K");
  }

  else if (goal === "giaikhat") {
    add("Dưa hấu + Bạc hà", "20K");
    add("Cam + Dứa + Táo", "30K");
    add("Dưa leo + Chanh + Bạc hà", "25K");
  }

  let html = "";

  if (menu.length === 0) {
    html = `<div class="item">Không có lựa chọn phù hợp</div>`;
  } else {
    menu.forEach(item => {
      html += `
        <div class="item">
          ${item.name}
          <span class="price">${item.price}</span>
        </div>
      `;
    });
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
