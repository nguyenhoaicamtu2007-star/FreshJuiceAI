<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>FreshJuice AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      color: #ff5e62;
      margin-bottom: 10px;
    }

    p {
      margin-top: 15px;
      font-weight: bold;
      text-align: left;
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #ff5e62;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e14b50;
    }

    .item {
      background: #fff3f3;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      text-align: left;
    }

    .title-result {
      margin-top: 20px;
      font-weight: bold;
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>FreshJuice AI</h2>

  <p>Khẩu vị</p>
  <select id="taste">
    <option>Ngọt</option>
    <option>Chua</option>
    <option>Thanh mát</option>
  </select>

  <p>Mục tiêu sức khỏe</p>
  <select id="goal">
    <option value="depda">Đẹp da</option>
    <option value="giamcan">Giảm cân</option>
    <option value="khang">Tăng đề kháng</option>
    <option value="giaikhat">Giải khát</option>
  </select>

  <p>Thời điểm sử dụng</p>
  <select id="time">
    <option value="ngay">Ban ngày</option>
    <option value="toi">Buổi tối</option>
  </select>

  <p>Dị ứng (có thể nhập nhiều: cam, dứa...)</p>
  <input type="text" id="allergy" placeholder="Ví dụ: cam, dứa">

  <button onclick="goiY()">Gợi ý</button>

  <div class="title-result">Kết quả gợi ý</div>
  <div id="result"></div>
</div>

<script>
function goiY() {
  let goal = document.getElementById("goal").value;
  let time = document.getElementById("time").value;

  let allergyInput = document.getElementById("allergy").value.toLowerCase();
  let allergies = allergyInput.split(",").map(a => a.trim());

  let menu = [];

  function isAllowed(name) {
    for (let a of allergies) {
      if (a && name.toLowerCase().includes(a)) {
        return false;
      }
    }
    return true;
  }

  function add(name) {
    if (isAllowed(name)) {
      menu.push(name);
    }
  }

  // Logic gợi ý
  if (goal === "khang") {
    add("Cam + Gừng – tăng đề kháng");
    add("Cam + Cà rốt – bổ sung vitamin");
    add("Dứa + Táo – thanh lọc cơ thể");
  }
else if (goal === "giamcan") {
    if (time === "ngay") {
      add("Cần tây + Chanh – hỗ trợ giảm cân");
      add("Táo + Cần tây – ít calo");
      add("Dưa leo + Chanh – thanh lọc");
    } else {
      add("Cần tây + Táo – nhẹ bụng");
      add("Dưa leo + Táo – ít năng lượng");
      add("Lê + Cần tây – dễ tiêu");
    }
  }

  else if (goal === "depda") {
    add("Dâu + Cam – sáng da");
    add("Cà rốt + Cam – giàu vitamin A");
    add("Dưa hấu + Táo – cấp nước");
  }

  else if (goal === "giaikhat") {
    add("Dưa hấu + Bạc hà – giải nhiệt");
    add("Cam + Dứa – tươi mát");
    add("Dưa leo + Chanh – thanh lọc");
  }

  let html = "";

  if (menu.length === 0) {
    html = `<div class="item">Không có lựa chọn phù hợp do dị ứng của bạn</div>`;
  } else {
    menu.forEach(item => {
      html += `<div class="item">${item}</div>`;
    });
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
